name: Maven Release & itch.io Deploy

on:
  push:
    tags:
      - "v*"
      
permissions:
  contents: write
  
jobs:
  build-release:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Prepare jpackage input
        shell: bash
        run: |
          mkdir -p jpackage-input
          # Explicitly copy the fat jar generated by the maven-shade-plugin
          cp target/*-launcher.jar jpackage-input/app.jar

      - name: Build Standalone App (jpackage)
        shell: bash
        run: |
          jpackage \
            --type app-image \
            --name "FlipNMatch" \
            --input jpackage-input \
            --main-jar app.jar \
            --dest jpackage-dest

      - name: Zip the output (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path jpackage-dest\FlipNMatch\* -DestinationPath FlipNMatch-Windows.zip

      - name: Zip the output (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd jpackage-dest/FlipNMatch
          zip -r ../../FlipNMatch-Linux.zip .

      - name: Zip the output (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd jpackage-dest
          ditto -c -k --sequesterRsrc --keepParent FlipNMatch.app ../FlipNMatch-macOS.zip
      
      - name: Upload Zip as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-zip-${{ matrix.os }}
          path: FlipNMatch-*.zip
          retention-days: 1


  deploy:
    needs: build-release 
    runs-on: ubuntu-latest
    
    steps:
      - name: Download all zipped builds
        uses: actions/download-artifact@v4
        with:
          pattern: game-zip-*
          merge-multiple: true
          path: builds/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: builds/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download and Set up Butler
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Push to itch.io via Butler
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          # The format is username/game-slug:channel
          ./butler push builds/FlipNMatch-Windows.zip hinode-codes/flip-and-match:windows
          ./butler push builds/FlipNMatch-Linux.zip hinode-codes/flip-and-match:linux
          ./butler push builds/FlipNMatch-macOS.zip hinode-codes/flip-and-match:mac
