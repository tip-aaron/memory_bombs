name: Maven Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    # This matrix runs the job 3 times on 3 different operating systems
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Prepare jpackage input
        shell: bash
        run: |
          mkdir -p jpackage-input
          
          # Explicitly copy the fat jar generated by the maven-shade-plugin
          cp target/*-launcher.jar jpackage-input/app.jar

      - name: Build Standalone App (jpackage)
        shell: bash
        # --type app-image creates a folder with your app + the bundled JRE (perfect for itch.io)
        run: |
          jpackage \
            --type app-image \
            --name "FlipNMatch" \
            --input jpackage-input \
            --main-jar app.jar \
            --dest jpackage-dest

      # ---- OS SPECIFIC ZIPPING ----
      # itch.io expects portable zip files, but each OS packages the App Image slightly differently.

      - name: Zip the output (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path jpackage-dest\FlipNMatch\* -DestinationPath FlipNMatch-Windows.zip

      - name: Zip the output (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd jpackage-dest/FlipNMatch
          zip -r ../../FlipNMatch-Linux.zip .

      - name: Zip the output (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd jpackage-dest
          # macOS apps are technically folders ending in .app. 'ditto' zips them safely so Mac doesn't break them.
          ditto -c -k --sequesterRsrc --keepParent FlipNMatch.app ../FlipNMatch-macOS.zip

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: FlipNMatch-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
