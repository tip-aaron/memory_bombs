@baseTheme = dark

color.primary = #425870
color.background = #0e1111ff
color.foreground = #f5f5f5ff
color.muted = #637179
color.error=#940700
color.success = #0c640cff
color.info = #115b64ff
color.warning = #665200ff
color.revealed = #514F41
color.hidden = #4A4A4A
foreground.hidden=#f5f5f5ff
foreground.flagged=#f5f5f5ff
foreground.revealed=#0e1111ff
foreground.success=#f5f5f5ff
foreground.primary = #f5f5f5ff
foreground.background = #f5f5f5ff
foreground.muted = #f5f5f5ff
foreground.error = #f5f5f5ff

@background = $color.background
@foreground = $foreground.background

Separator.height = 3
Separator.stripeWidth = 2

@arc = 24
defaultFont=18 "Fira Code"

h00.font = +33 bold
h0.font = +25 bold
h1.font = +18 bold
h2.font = +13 bold
h3.font = +9 bold
h4.font = +5 bold

Button.arc = 12
Button.margin = 8, 16, 8, 16
Button.default.boldText = true
Button.font = semibold
Button.iconTextGap = 8
ToggleButton.font = semibold

MenuItem.checkBackground = $color.primary

Panel.background = @background
Panel.foreground = @foreground

PopupMenu.background = tint(@background, 15%)
PopupMenu.foreground = tint(@foreground, 15%)
PopupMenu.borderColor = tint($color.muted, 15%)
PopupMenu.borderCornerRadius = 16
PopupMenu.borderInsets = 10, 10, 10, 10

ComboBox.padding = 8, 16, 8, 16
ComboBox.maximumRowCount = 5

Component.arc = @arc
Component.error.borderColor = $color.error
Component.error.focusedBorderColor = tint($color.error, 20%)
Component.warning.borderColor = $color.warning
Component.warning.focusedBorderColor = tint($color.warning, 20%)

ScrollBar.showButtons = true
ScrollBar.trackArc = $ScrollBar.thumbArc
ScrollBar.thumbInsets = 1, 1, 1, 1
ScrollBar.width = 9
ScrollBar.hoverThumbWithTrack = true
ScrollBar.pressedThumbWithTrack=true
ScrollPane.border=\
    0,0,0,0

[style]ToggleButton.revealButton = \
    border:2,0,2,4; \
    foreground:fade(#1a1a19, 87%); \
    toolbar.selectedBackground:fade($foreground.primary,0%);\
    toolbar.hoverBackground:fade($foreground.primary,0%);\
    toolbar.pressedBackground:fade($foreground.primary,0%);

[style]Button.primary = \
	background:$color.primary; \
	foreground:$foreground.primary; \
	borderColor:fade($color.muted, 50%); \
	focusedBorderColor:fade($color.primary,87%);\
	focusColor:fade($color.primary,25%); \
	focusedBackground:fade($color.primary,87%); \
    focusWidth:2;

[style]Button.matched = \
	background:$color.success; \
	foreground:$foreground.success; \
    disabledBackground:darken($color.success, 5%); \
    disabledText:darken($foreground.success, 5%); \
	borderColor:fade($color.muted, 50%); \
	focusedBorderColor:fade($color.success,87%);\
	focusColor:fade($color.success,25%); \
	focusedBackground:fade($color.success,87%); \
    focusWidth:2;

[style]Button.hidden = \
	background:$color.hidden; \
	foreground:$foreground.hidden; \
	borderColor:fade($color.primary, 50%); \
	focusedBorderColor:fade($color.hidden,87%);\
	focusColor:fade($color.hidden,25%); \
	focusedBackground:fade($color.hidden,87%); \
    focusWidth:2;

[style]Button.revealed = \
	background:$color.revealed; \
	foreground:$foreground.revealed; \
	borderColor:fade($color.muted, 50%); \
	focusedBorderColor:fade($color.revealed,87%);\
	focusColor:fade($color.revealed,25%); \
	focusedBackground:fade($color.success,87%); \
    focusWidth:2;

[style]Button.flagged = \
	background:$color.error; \
	foreground:$foreground.error; \
	borderColor:fade($color.error, 50%); \
	focusedBorderColor:fade($color.error,87%);\
	focusColor:fade($color.error,25%); \
	focusedBackground:fade($color.error,87%); \
    focusWidth:2;

[style]Button.muted = \
	background:$color.muted; \
	foreground:$foreground.muted; \
	borderColor:fade($color.primary, 50%); \
	focusedBorderColor:fade($color.primary,87%);\
	focusColor:fade($color.muted,25%); \
	focusedBackground:fade($color.muted,87%);\
    focusWidth:2;

[style]Button.ghost = \
    background:fade($color.primary,0%); \
    foreground:$foreground.background; \
    borderColor:fade($color.primary,0%); \
    hoverBorderColor:fade($color.muted,50%);\
    focusedBackground:fade($color.primary,0%); \
    focusedBorderColor:fade($color.muted, 87%); \
    focusColor:fade($color.primary,25%); \
    hoverBackground:fade($color.primary,25%); \
    selectedBackground:fade($color.primary, 87%); \
    selectedForeground:$foreground.primary;\
    focusWidth:2;

[style]Button.link = \
    buttonType:tab; \
    background:fade($foreground.primary,0%); \
    focusedBackground:fade($foreground.primary,0%); \
    hoverBackground:fade($foreground.primary,0%); \
    pressedBackground:fade($foreground.primary,0%); \
    selectedBackground:fade($foreground.primary,0%); \
    disabledSelectedBackground:fade($foreground.primary,0%); \
    borderColor:fade($color.muted,0%); \
    hoverBorderColor:fade($color.muted,0%); \
    focusedBorderColor:fade($color.muted,87%); \
    foreground:fade($color.primary,87%); \
    hoverForeground:$color.primary; \
    focusedForeground:$color.primary;

[style]Label.primary = \
	foreground:$color.primary;

[style]Label.muted = \
    foreground:$color.muted;

[style]Label.error = \
    foreground:$color.error;
# --- MINESWEEPER NUMBER COLORS (Adjusted for Dark Mode) ---
# 1: Bright Blue
color.num1=#5DADE2
# 2: Bright Green
color.num2=#58D68D
# 3: Light Red / Coral
color.num3=#E74C3C
# 4: Lavender / Light Purple (Replacing Dark Blue)
color.num4=#AF7AC5
# 5: Pink / Light Rose (Replacing Maroon)
color.num5=#F1948A
# 6: Bright Cyan
color.num6=#48C9B0
# 7: Off-White / Cream (Replacing Black for dark mode visibility)
color.num7=#F5F5F5
# 8: Silver / Medium Gray
color.num8=#AAB7B8
# --- NUMBER STYLES ---
[style]Label.num1=foreground:$color.num1; font:bold;
[style]Label.num2=foreground:$color.num2; font:bold;
[style]Label.num3=foreground:$color.num3; font:bold;
[style]Label.num4=foreground:$color.num4; font:bold;
[style]Label.num5=foreground:$color.num5; font:bold;
[style]Label.num6=foreground:$color.num6; font:bold;
[style]Label.num7=foreground:$color.num7; font:bold;
[style]Label.num8=foreground:$color.num8; font:bold;
# If your tiles are Buttons instead of Labels, you can use these:
[style]Button.num1=foreground:$color.num1; font:bold;
[style]Button.num2=foreground:$color.num2; font:bold;
[style]Button.num3=foreground:$color.num3; font:bold;
[style]Button.num4=foreground:$color.num4; font:bold;
[style]Button.num5=foreground:$color.num5; font:bold;
[style]Button.num6=foreground:$color.num6; font:bold;
[style]Button.num7=foreground:$color.num7; font:bold;
[style]Button.num8=foreground:$color.num8; font:bold;